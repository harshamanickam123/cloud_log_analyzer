<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudLog AI | Secure Access</title>
    <style>
        /* Base Reset & Background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            width: 100%;
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated background elements for "Cloud" feel */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(0, 150, 255, 0.1);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-100px, -100px); }
            to { transform: translate(100px, 100px); }
        }

        /* Container & Flip Logic */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        #signup_toggle {
            display: none;
        }

        .form {
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            width: 350px;
            height: 500px;
        }

        /* The Flip Effect Trigger */
        #signup_toggle:checked + .form {
            transform: rotateY(-180deg);
        }

        /* Front & Back Styling */
        .form_front, .form_back {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: absolute;
            backface-visibility: hidden;
            width: 100%;
            height: 100%;
            padding: 40px;
            border-radius: 20px;
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .form_back {
            transform: rotateY(-180deg);
        }

        /* Branding */
        .logo-text {
            color: #00d4ff;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: -10px;
        }

        .form_details {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }

        /* Inputs & Buttons */
        .input {
            width: 100%;
            min-height: 45px;
            color: #fff;
            outline: none;
            transition: 0.35s;
            padding: 0px 15px;
            background-color: #212121;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
        }

        .input:focus {
            transform: scale(1.02);
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff 0%, #0027ff 100%);
            border-radius: 8px;
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .switch {
            font-size: 13px;
            color: #aaa;
            margin-top: 15px;
        }

        .signup_tog {
            color: #00d4ff;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            margin-left: 5px;
        }

        .signup_tog:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <input type="checkbox" id="signup_toggle">
        
        <form class="form" onsubmit="return handleAuth(event)">
            <div class="form_front">
                <div class="logo-text">CloudLog Analyzer</div>
                <div class="form_details">Welcome Back</div>
                <input placeholder="Enter Username" class="input" type="text" required>
                <input placeholder="Enter Password" class="input" type="password" required>
                <button type="submit" class="btn">Login</button>
                <span class="switch">New to CloudLog? 
                    <label class="signup_tog" for="signup_toggle">Create Account</label>
                </span>
            </div>
        

            <div class="form_back">
                <div class="logo-text">CloudLog Analyzer</div>
                <div class="form_details">Register </div>
                <input placeholder="Full Name" class="input" type="text">
                <input placeholder="Work Email" class="input" type="email">
                <input placeholder="Set Password" class="input" type="password">
                <input placeholder="Confirm Password" class="input" type="password">
                <button type="submit" class="btn">Create Account</button>
                <span class="switch">Already authorized? 
                    <label class="signup_tog" for="signup_toggle">Sign In</label>
                </span>
            </div>
        </form>
    </div>
<script>
async function handleAuth(e) {
    e.preventDefault();

    const isSignup = document.getElementById("signup_toggle").checked;

    if (isSignup) {
        // REGISTER
        const inputs = document.querySelectorAll(".form_back .input");

        const name = inputs[0].value;
        const email = inputs[1].value;
        const password = inputs[2].value;

        const res = await fetch("/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (data.status === "success") {
            alert("Registered successfully!");
            document.getElementById("signup_toggle").checked = false;
        } else {
            alert(data.message);
        }

    } else {
        // LOGIN
        const inputs = document.querySelectorAll(".form_front .input");

        const username = inputs[0].value;
        const password = inputs[1].value;

        const res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.status === "success") {
            // SAVE LOGIN STATE
            localStorage.setItem("loggedIn", "true");

            // GO TO DASHBOARD
            window.location.href = "dashboard.html";
        } else {
            alert("Login failed!");
        }
    }
}
</script>
</body>
</html>
